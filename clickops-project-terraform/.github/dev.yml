name: Deploy DEV

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Terraform DEV
        run: |
          cd terraform/environments/dev
          terraform init
          terraform validate
          terraform apply -auto-approve -var-file=dev.tfvars

      - name: Login ECR
        run: |
          aws ecr get-login-password \
          | docker login --username AWS \
          --password-stdin ${{ secrets.ECR_URL }}

      - name: Build Frontend
        run: |
          docker build -t frontend-dev ./app/frontend

      - name: Build Backend
        run: |
          docker build -t backend-dev ./app/backend

      - name: Push Frontend
        run: |
          docker tag frontend-dev:latest ${{ secrets.DEV_FRONTEND_REPO }}:latest
          docker push ${{ secrets.DEV_FRONTEND_REPO }}:latest

      - name: Push Backend
        run: |
          docker tag backend-dev:latest ${{ secrets.DEV_BACKEND_REPO }}:latest
          docker push ${{ secrets.DEV_BACKEND_REPO }}:latest

      - name: Deploy DEV
        run: |
          aws ssm send-command \
          --instance-ids "${{ secrets.DEV_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --parameters commands='[
            "aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin '${{ secrets.ECR_URL }}'",
            "docker pull '${{ secrets.DEV_BACKEND_REPO }}':latest",
            "docker stop backend || true",
            "docker rm backend || true",
            "docker run -d --name backend -p 5000:5000 '${{ secrets.DEV_BACKEND_REPO }}':latest"
          ]'