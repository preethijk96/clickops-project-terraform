name: Deploy App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: ap-south-1

    - name: Login to ECR
      run: |
        aws ecr get-login-password \
        | docker login --username AWS --password-stdin ${{ secrets.ECR_URL }}

    - name: Build & Push Frontend
      run: |
        docker build -t frontend ./app/frontend
        docker tag frontend:latest ${{ secrets.FRONTEND_REPO }}:fe-v1
        docker push ${{ secrets.FRONTEND_REPO }}:fe-v1

    - name: Build & Push Backend
      run: |
        docker build -t backend ./app/backend
        docker tag backend:latest ${{ secrets.BACKEND_REPO }}:be-v1
        docker push ${{ secrets.BACKEND_REPO }}:be-v1

    - name: Deploy to EC2 via SSM
      run: |
        aws ssm send-command \
        --instance-ids "${{ secrets.EC2_ID }}" \
        --document-name "AWS-RunShellScript" \
        --parameters commands="docker pull ${{ secrets.FRONTEND_REPO }}:fe-v1 && docker restart frontend"