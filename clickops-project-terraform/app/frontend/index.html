<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ClickOps Multi Environment App</title>

<style>
body{
font-family:Arial;
background:#f4f6fb;
padding:30px;
text-align:center;
}

h1{
color:#333;
}

.env{
margin-bottom:20px;
font-weight:bold;
color:#0d6efd;
}

form{
background:white;
padding:20px;
max-width:450px;
margin:auto;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input{
width:90%;
padding:10px;
margin:10px;
border:1px solid #ccc;
border-radius:6px;
}

button{
background:#0d6efd;
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#084298;
}

#msg{
margin-top:15px;
font-weight:bold;
color:green;
}

#records{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:30px;
gap:20px;
}

.card{
background:white;
padding:15px;
width:220px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.card img{
margin-top:10px;
border-radius:8px;
max-width:100%;
}
</style>

</head>
<body>

<h1>ClickOps Student Registration</h1>

<div class="env" id="environment"></div>

<form id="form" enctype="multipart/form-data">

<input
type="text"
name="name"
placeholder="Enter Name"
required
>

<input
type="number"
name="age"
placeholder="Enter Age"
required
>

<input
type="file"
name="image"
required
>

<button type="submit">
Submit
</button>

</form>

<div id="msg"></div>

<h2>Registered Students</h2>

<div id="records"></div>

<script>

const portMap={
"8081":"5001",
"8082":"5002",
"8083":"5003"
};

const envMap={
"8081":"DEV Environment",
"8082":"QA Environment",
"8083":"PROD Environment"
};

const currentPort=window.location.port;

document.getElementById("environment").innerHTML=
envMap[currentPort] || "Environment";

const API=
window.location.protocol+"//"+
window.location.hostname+":"+
portMap[currentPort];

document
.getElementById("form")
.addEventListener(
"submit",
async function(e){

e.preventDefault();

let formData=
new FormData(e.target);

try{

let res=
await fetch(
`${API}/add`,
{
method:"POST",
body:formData
}
);

let data=
await res.json();

document
.getElementById("msg")
innerHTML=data.message;

e.target.reset();

loadData();

}
catch(err){
document
.getElementById("msg")
.innerHTML=
"Error submitting form";
}

}
);

async function loadData(){

try{

let res=
await fetch(
`${API}/students`
);

let users=
await res.json();

let html="";

users.forEach(function(u){

html+=`
<div class="card">
<h3>${u.name}</h3>
<p>Age: ${u.age}</p>
<img src="${u.image}">
<p><b>${u.environment}</b></p>
</div>
`;

});

document
.getElementById("records")
.innerHTML=html;

}
catch(err){
document
.getElementById("records")
.innerHTML=
"<p>Could not load data</p>";
}

}

loadData();

</script>

</body>
</html>
