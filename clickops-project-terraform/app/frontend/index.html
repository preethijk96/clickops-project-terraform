<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ClickOps Students Entry Form</title>

<style>
body{
 margin:0;
 font-family:Arial,sans-serif;
 background:linear-gradient(to right,#5c6cf0,#b06cf0);
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
}

.container{
 background:#fff;
 width:420px;
 padding:40px;
 border-radius:20px;
 text-align:center;
 box-shadow:0 8px 30px rgba(0,0,0,.25);
}

h1{
 font-size:34px;
 margin-bottom:30px;
}

input{
 width:90%;
 padding:14px;
 margin:10px 0;
 border:1px solid #ccc;
 border-radius:8px;
}

button{
 background:#4267d6;
 color:white;
 border:none;
 padding:14px 35px;
 margin-top:18px;
 border-radius:8px;
 cursor:pointer;
 font-size:16px;
}

button:hover{
 opacity:.95;
}

#records{
 margin-top:25px;
 font-weight:bold;
 font-size:18px;
}

#msg{
 margin-top:15px;
 font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>ClickOps Students Entry Form</h1>

<form id="studentForm" enctype="multipart/form-data">

<input
type="text"
name="name"
placeholder="Enter your name"
required
>

<input
type="number"
name="age"
placeholder="Enter your age"
required
>

<input
type="file"
name="image"
required
>

<br>

<button type="submit">
Submit
</button>

</form>

<div id="msg"></div>

<div id="records">
Records
</div>

</div>

<script>
document
.getElementById("studentForm")
.addEventListener(
"submit",
async function(e){

e.preventDefault();

let formData = new FormData(this);

try{

const response = await fetch(
http://3.6.92.244:5003/add
{
method:"POST",
body:formData
}
);

if(response.ok){

document.getElementById("msg").innerHTML=
"Submitted Successfully";

alert("Submitted Successfully");

this.reset();

}else{

document.getElementById("msg").innerHTML=
"Submission Failed";

alert("Submission Failed");
}

}
catch(error){

document.getElementById("msg").innerHTML=
"Submission Failed";

alert("Submission Failed");

console.log(error);
}

});
</script>

</body>
</html>
