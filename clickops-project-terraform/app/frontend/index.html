<!DOCTYPE html>
<html>
<head>
<title>ClickOps Students Entry Form</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(90deg,#5769e9,#a96bf5);
min-height:100vh;
padding-top:55px;
}

.container{
display:flex;
flex-direction:column;
align-items:center;
}

.form-box{
background:#fff;
width:420px;
padding:28px;
border-radius:15px;
box-shadow:0 4px 20px rgba(0,0,0,.15);
text-align:center;
}

h2{
margin-bottom:20px;
}

input[type=text],
input[type=number]{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ddd;
border-radius:4px;
}

.filebox{
margin-top:10px;
text-align:left;
}

button{
margin-top:14px;
background:#4e68ea;
color:white;
border:none;
padding:8px 25px;
border-radius:5px;
cursor:pointer;
}

#msg{
margin-top:15px;
color:green;
font-weight:bold;
}

#records{
width:420px;
margin-top:15px;
}

.card{
background:#fff;
margin-top:12px;
padding:18px;
border-radius:12px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.card img{
width:90px;
height:90px;
object-fit:cover;
margin-top:10px;
border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<div class="form-box">

<h2>ClickOps Students Entry Form</h2>

<form id="studentForm">

<input
id="name"
type="text"
placeholder="Enter your name"
required
>

<input
id="age"
type="number"
placeholder="Enter your age"
required
>

<div class="filebox">
<input
id="image"
type="file"
required
>
</div>

<button type="submit">
Submit
</button>

</form>

<div id="msg"></div>

</div>

<div id="records"></div>

</div>

<script>

const API="http://65.0.29.134:5001";

document.getElementById(
"studentForm"
).addEventListener(
"submit",
async function(e){

e.preventDefault();

let fd=new FormData();

fd.append(
"name",
document.getElementById("name").value
);

fd.append(
"age",
document.getElementById("age").value
);

fd.append(
"image",
document.getElementById("image").files[0]
);

let res=await fetch(
API+"/add",
{
method:"POST",
body:fd
}
);

let data=await res.json();

document.getElementById(
"msg"
).innerHTML=
"Student saved successfully";

document.getElementById(
"records"
).innerHTML=
`
<div class='card'>
<h3>${data.user.name}</h3>
<p>Age ${data.user.age}</p>
<img src="${data.user.image}">
</div>
`;

document.getElementById(
"studentForm"
).reset();

}
);

</script>

</body>
</html>
