<!DOCTYPE html>
<html>
<head>
<title>ClickOps Terraform Project</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #2193b0, #6dd5ed);
    text-align: center;
}
.container {
    background: white;
    padding: 25px;
    width: 350px;
    margin: auto;
    margin-top: 60px;
    border-radius: 15px;
}
input {
    width: 90%;
    padding: 10px;
    margin: 8px;
}
button {
    padding: 10px;
    margin: 5px;
}
.card {
    background: white;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Welcome to ClickOps Terraform Project 2026</h2>

    <form id="form">
        <input name="name" placeholder="Enter Name" required><br>
        <input name="age" placeholder="Enter Age" required><br>
        <input type="file" name="image" required><br>

        <button type="submit">Submit</button>
    </form>

    <h3 id="msg"></h3>
</div>

<div id="data"></div>

<script>
const API = "http://13.232.195.102:5000";

const ENV = "dev";

const bucketMap = {
    dev: "clickops-bucket-dev",
    qa: "clickops-bucket-qa",
    prd: "clickops-bucket-prd"
};

const BUCKET = bucketMap[ENV];

document.getElementById("form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const formData = new FormData(e.target);

    const res = await fetch(`${API}/add`, {
        method: "POST",
        body: formData
    });

    const data = await res.json();
    document.getElementById("msg").innerText = data.message;

    loadData();
});

async function loadData() {
    const res = await fetch(`${API}/list`);
    const users = await res.json();

    const div = document.getElementById("data");
    div.innerHTML = "";

    users.forEach(u => {
        div.innerHTML += `
        <div class="card">
            <p><b>${u.name}</b> (${u.age})</p>
            <img src="https://${BUCKET}.s3.amazonaws.com/${u.image}" width="120"/>
        </div>
        `;
    });
}

loadData();
</script>

</body>
</html>
