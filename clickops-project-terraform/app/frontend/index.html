<!DOCTYPE html>
<html>
<head>
<title>ClickOps Students Entry Form</title>

<style>
body{
background:linear-gradient(to right,#5b6cf9,#a96ef7);
font-family:Arial;
text-align:center;
margin:0;
padding:0;
}

.box{
background:white;
width:400px;
margin:auto;
margin-top:60px;
padding:30px;
border-radius:18px;
box-shadow:0 5px 20px gray;
}

input{
width:90%;
padding:10px;
margin:8px;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:10px 18px;
border:none;
border-radius:8px;
background:#4169e1;
color:white;
cursor:pointer;
}

button:hover{
background:#274fcf;
}

.card{
background:white;
width:300px;
margin:auto;
margin-top:20px;
padding:20px;
border-radius:15px;
box-shadow:0 3px 10px lightgray;
}

.card img{
margin-top:10px;
border-radius:8px;
}

#msg{
color:green;
margin-top:15px;
}
</style>

</head>
<body>

<div class="box">
<h2>ClickOps Students Entry Form</h2>

<form id="form" enctype="multipart/form-data">

<input
name="name"
placeholder="Enter your name"
required
>

<input
name="age"
placeholder="Enter your age"
required
>

<input
type="file"
name="image"
required
>

<button type="submit">
Submit
</button>

</form>

<h3 id="msg"></h3>

</div>

<div id="records"></div>


<script>

// Backend API
const API = window.location.protocol + "//" + window.location.hostname + ":5000";


// Submit form
document.getElementById("form").addEventListener(
"submit",
async function(e){

e.preventDefault();

let formData = new FormData(e.target);

try{

let res = await fetch(
`${API}/add`,
{
method:"POST",
body:formData
}
);

let data = await res.json();

document.getElementById("msg").innerHTML =
data.message || "Student saved successfully";

e.target.reset();

loadData();

}
catch(err){
document.getElementById("msg").innerHTML="Submit failed";
console.log(err);
}

}
);


// Load records
async function loadData(){

try{

let res = await fetch(`${API}/students`);

let users = await res.json();

let html="";

users.forEach(u=>{

html+=`
<div class='card'>
<h3>${u.name}</h3>
<p>Age ${u.age}</p>
<img src="${u.image}" width="150">
</div>
`;

});

document.getElementById("records").innerHTML=html;

}
catch(err){
console.log(err);
}

}

loadData();

</script>

</body>
</html>
