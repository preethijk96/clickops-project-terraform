<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ClickOps Students Form</title>
<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(to right,#5c6cf0,#b06cf0);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}
.container{
background:#fff;
padding:35px;
width:450px;
border-radius:20px;
text-align:center;
}
input{
width:90%;
padding:12px;
margin:10px;
}
button{
background:#4361ee;
color:white;
border:none;
padding:14px 30px;
border-radius:8px;
}
.student{
margin-top:15px;
padding:15px;
border:1px solid #ddd;
}
.student img{
width:120px;
}
</style>
</head>
<body>

<div class="container">
<h2>ClickOps Students Entry Form</h2>

<form id="studentForm">
<input name="name" placeholder="Name" required>
<input name="age" placeholder="Age" required>
<input type="file" name="image" required>

<button type="submit">Submit</button>
</form>

<h3>Records</h3>
<div id="records"></div>

</div>

<script>

async function loadRecords(){
let r=await fetch("/list");
let data=await r.json();

let html="";

data.forEach(x=>{
html+=`
<div class='student'>
<b>Name:</b> ${x.name}<br>
<b>Age:</b> ${x.age}<br>
<img src="${x.image}">
</div>`;
});

document.getElementById("records").innerHTML=html;
}

document.getElementById("studentForm")
.addEventListener("submit",async function(e){

e.preventDefault();

let formData=new FormData(this);

let res=await fetch("/add",{
method:"POST",
body:formData
});

if(res.ok){
alert("Submit successful!");
this.reset();
loadRecords();
}
else{
alert("Submission Failed");
}

});

loadRecords();

</script>

</body>
</html>
