version: "3.8"

services:
  mongodb:
    image: mongo
    container_name: mongodb-${ENV}
    ports:
      - "${MONGO_PORT}:27017"

  backend:
    build: ../app/backend
    container_name: backend-${ENV}
    ports:
      - "${BACKEND_PORT}:3000"
    environment:
      - ENV=${ENV}
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
    depends_on:
      - mongodb

  frontend:
    build: ../app/frontend
    container_name: frontend-${ENV}
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend