services:
  mongodb:
    image: mongo
    ports:
      - "27017:27017"

  backend:
    build: ../app/backend
    ports:
      - "5000:3000"
    environment:
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - ENV=dev   # 🔁 change to qa / prd when needed
    depends_on:
      - mongodb

  frontend:
    build: ../app/frontend
    ports:
      - "3000:80"
    depends_on:
      - backend