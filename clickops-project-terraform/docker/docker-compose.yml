services:

 mongodb:
  image: mongo:latest
  container_name: mongodb
  ports:
   - "27017:27017"

 backend:
  build: .
  container_name: docker_backend
  ports:
   - "5000:5000"

  environment:
   ENVIRONMENT: ${ENVIRONMENT}
   BUCKET_NAME: ${BUCKET_NAME}

  depends_on:
   - mongodb

 frontend:
  build:
   context: .
   dockerfile: Dockerfile.frontend
  container_name: docker_frontend
  ports:
   - "80:80"