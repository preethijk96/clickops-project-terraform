services:

 mongodb:
  image: mongo
  ports:
   - "27017:27017"

 backend:
  build: ../app/backend
  ports:
   - "5000:3000"

  environment:
   MONGO_HOST: mongodb
   MONGO_PORT: 27017
   AWS_REGION: ap-south-1
   S3_BUCKET: clickops-${ENV}-bucket

  volumes:
   - ~/.aws:/root/.aws:ro

  depends_on:
   - mongodb


 frontend:
  build: ../app/frontend
  ports:
   - "80:80"

  depends_on:
   - backend