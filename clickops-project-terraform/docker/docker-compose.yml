version: "3.8"

services:

  mongodb:
    image: mongo:latest
    container_name: mongodb-${ENVIRONMENT}
    restart: always
    ports:
      - "27017:27017"


  backend:
    build: ../app/backend
    container_name: backend-${ENVIRONMENT}
    restart: always
    ports:
      - "${BACKEND_PORT}:5000"

    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      BUCKET_NAME: ${BUCKET_NAME}
      DB_NAME: ${DB_NAME}

      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ap-south-1

    depends_on:
      - mongodb


  frontend:
    build: ../app/frontend
    container_name: frontend-${ENVIRONMENT}
    restart: always
    ports:
      - "${FRONTEND_PORT}:80"

    depends_on:
      - backend