version: "3.8"

services:

  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    restart: always


  backend:
    build: ../app/backend
    container_name: docker_backend
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    restart: always


  frontend:
    build: ../app/frontend
    container_name: docker_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always