version: "3"

services:
  mongodb:
    image: mongo
    container_name: mongodb
    ports:
      - "27017:27017"

  backend:
    image: <ECR_URL>:be-v1
    ports:
      - "3000:3000"
    environment:
      - BUCKET_NAME=clickops-s3-dev
      - SECRET_NAME=clickops-sm-dev
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
    depends_on:
      - mongodb

  frontend:
    image: <ECR_URL>:fe-v1
    ports:
      - "80:80"
    depends_on:
      - backend