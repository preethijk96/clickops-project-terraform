version: "3.8"

services:

  mongodb-dev:
    image: mongo:latest
    container_name: mongodb-dev
    ports:
      - "27017:27017"

  backend-dev:
    build: ../app/backend
    container_name: backend-dev
    ports:
      - "5001:5000"
    environment:
      ENVIRONMENT: dev
      BUCKET_NAME: clickops-bucket-dev
      DB_NAME: clickops-dev
    volumes:
      - /root/.aws:/root/.aws:ro
    depends_on:
      - mongodb-dev

  
frontend-dev:
  ports:
    - "80:80"


  mongodb-qa:
    image: mongo:latest
    container_name: mongodb-qa
    ports:
      - "27018:27017"

  backend-qa:
    build: ../app/backend
    container_name: backend-qa
    ports:
      - "5002:5000"
    environment:
      ENVIRONMENT: qa
      BUCKET_NAME: clickops-bucket-qa
      DB_NAME: clickops-qa
    volumes:
      - /root/.aws:/root/.aws:ro
    depends_on:
      - mongodb-qa

  frontend-qa:
    build: ../app/frontend
    container_name: frontend-qa
    ports:
      - "8082:80"



  mongodb-prd:
    image: mongo:latest
    container_name: mongodb-prd
    ports:
      - "27019:27017"

  backend-prd:
    build: ../app/backend
    container_name: backend-prd
    ports:
      - "5003:5000"
    environment:
      ENVIRONMENT: prd
      BUCKET_NAME: clickops-bucket-prd
      DB_NAME: clickops-prd
    volumes:
      - /root/.aws:/root/.aws:ro
    depends_on:
      - mongodb-prd

  frontend-prd:
    build: ../app/frontend
    container_name: frontend-prd
    ports:
      - "8083:80"