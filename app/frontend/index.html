<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ClickOps Students Form</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(to right,#5c6cf0,#b06cf0);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:white;
padding:35px;
border-radius:20px;
width:450px;
text-align:center;
box-shadow:0 8px 25px rgba(0,0,0,.2);
}

input{
width:90%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#4361ee;
color:white;
border:none;
padding:14px 30px;
border-radius:8px;
cursor:pointer;
}

.student{
margin-top:15px;
padding:15px;
border:1px solid #ddd;
border-radius:12px;
}

.student img{
width:120px;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>ClickOps Students Entry Form</h2>

<form id="studentForm" onsubmit="return false;">

<input type="text" name="name" placeholder="Enter your name" required>
<input type="number" name="age" placeholder="Enter your age" required>
<input type="file" name="image" required>

<br><br>

<button type="button" onclick="submitForm()">
Submit
</button>

</form>

<h3>Records</h3>
<div id="records"></div>

</div>

<script>

const API="http://"+window.location.hostname+":5000";

async function loadRecords(){

try{

let res=await fetch(API+"/list");
let data=await res.json();

let html="";

data.forEach(item=>{
html+=`
<div class="student">
<b>Name:</b> ${item.name}<br>
<b>Age:</b> ${item.age}<br>
<img src="${item.image}">
</div>
`;
});

document.getElementById("records").innerHTML=html;

}catch(e){
console.log(e);
}

}

async function submitForm(){

let form=document.getElementById("studentForm");
let formData=new FormData(form);

try{

let res=await fetch(API+"/add",{
method:"POST",
body:formData
});

let data=await res.json();

if(res.ok){
alert("Submit successful!");
form.reset();
loadRecords();
}
else{
alert("Submission Failed");
console.log(data);
}

}catch(e){
alert("Submission Failed");
console.log(e);
}

}

loadRecords();

</script>

</body>
</html>
